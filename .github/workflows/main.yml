name: Stock Analysis Workflow1
on:
  workflow_dispatch:
  schedule:
    - cron: '07 8 * * *'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 lxml yfinance pykrx
          pip install -U finance-datareader
      - name: Step 1 - Start
        env:
          IGYEOK_WEBHOOK_URL: ${{ secrets.IGYEOK_WEBHOOK_URL }}
        run: python start.py
